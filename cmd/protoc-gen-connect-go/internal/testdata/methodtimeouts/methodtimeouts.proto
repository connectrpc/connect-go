syntax = "proto3";

package connect.test.method_timeouts;

import "connectrpc/go/options/v1/annotations.proto";

message Request {}

message Response {}

service TestService {
  rpc Method0(Request) returns (Response) {}

  rpc Method1(Request) returns (Response) {
    option (connectrpc.go.options.v1.timeouts) = {
      read_ms: 1000
      write_ms: 2000
    };
  }

  rpc Method2(Request) returns (Response) {
    option (connectrpc.go.options.v1.timeouts) = {
      read_ms: -1
      write_ms: -1
    };
  }

  rpc Method3(Request) returns (Response) {
    option (connectrpc.go.options.v1.timeouts) = {
      read_ms: 1000
    };
  }

  rpc Method4(Request) returns (Response) {
    option (connectrpc.go.options.v1.timeouts) = {
      read_ms: 1000
      write_ms: 0
    };
  }
}
