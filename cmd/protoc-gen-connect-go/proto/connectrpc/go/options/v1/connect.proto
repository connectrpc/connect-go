syntax = "proto3";

package connectrpc.go.options.v1;

option go_package = "connectrpc.com/connect/cmd/protoc-gen-connect-go/gen/connectrpc/go/options/v1;optionsv1";

message MethodTimeouts {
	// Timeout in milliseconds to read the entire request 
	// (including the body).
	// A negative value means no timeout.
	int64 read_ms = 1;
	// Timeout in milliseconds for writing the response.
	// A negative value means no timeout.
	int64 write_ms = 2;
}