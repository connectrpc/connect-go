version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: connectrpc.com/connect/cmd/protoc-gen-connect-go/gen
plugins:
  - local: protoc-gen-go
    out: cmd/protoc-gen-connect-go/gen
    opt: paths=source_relative
inputs:
  - directory: cmd/protoc-gen-connect-go/proto